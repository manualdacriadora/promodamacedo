  <style>
    :root {
      --pink-hot: #FF2D8B;
      --pink-mid: #FF6BB5;
      --pink-soft: #FFD6EC;
      --pink-pale: #FFF0F8;
      --pink-dark: #C4006B;
      --white: #FFFFFF;
      --text-dark: #2A002E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-pale);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: var(--pink-hot);
      top: -120px; left: -120px;
      animation-delay: 0s;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: var(--pink-mid);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .bg-blob-3 {
      width: 300px; height: 300px;
      background: #FFB3D9;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Floating sparkles */
    .sparkles {
      position: fixed;
      width: 100%; height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 1;
    }
    .sparkle {
      position: absolute;
      font-size: 1.2rem;
      animation: sparkle-float linear infinite;
      opacity: 0;
    }
    @keyframes sparkle-float {
      0% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,45,139,0.18);
      border-radius: 32px;
      padding: 40px 32px 44px;
      max-width: 420px;
      width: 92%;
      text-align: center;
      box-shadow:
        0 8px 40px rgba(255,45,139,0.18),
        0 2px 8px rgba(255,45,139,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: card-in 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--pink-hot), var(--pink-dark));
      color: #fff;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(255,45,139,0.35);
      animation: card-in 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    /* Photo */
    .photo-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 20px;
      animation: card-in 0.7s 0.15s cubic-bezier(.22,1,.36,1) both;
    }
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-hot), #FF9AD5, var(--pink-dark));
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .photo-wrap img {
      position: relative;
      z-index: 1;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 4px solid #fff;
      display: block;
      margin: 5px auto 0;
    }

    /* Headline */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.1;
      color: var(--text-dark);
      margin-bottom: 10px;
      animation: card-in 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
    }
    h1 span {
      background: linear-gradient(135deg, var(--pink-hot), var(--pink-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subline {
      font-size: 0.95rem;
      font-weight: 600;
      color: #9B4472;
      margin-bottom: 26px;
      line-height: 1.5;
      animation: card-in 0.7s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    /* Emoji bullets */
    .benefits {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
      animation: card-in 0.7s 0.3s cubic-bezier(.22,1,.36,1) both;
    }
    .benefit {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,45,139,0.07);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-dark);
      text-align: left;
    }
    .benefit .icon { font-size: 1.2rem; flex-shrink: 0; }

    /* CTA Button */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.08rem;
      font-weight: 800;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        0 6px 24px rgba(37,211,102,0.4),
        0 2px 8px rgba(37,211,102,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: card-in 0.7s 0.35s cubic-bezier(.22,1,.36,1) both, pulse-btn 2.5s 1.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .cta-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shimmer 2.5s 1.5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      50% { left: 150%; }
      100% { left: 150%; }
    }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 6px 24px rgba(37,211,102,0.4), 0 2px 8px rgba(37,211,102,0.2); }
      50% { box-shadow: 0 8px 32px rgba(37,211,102,0.65), 0 4px 16px rgba(37,211,102,0.3); }
    }
    .cta-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 32px rgba(37,211,102,0.55);
    }
    .cta-btn:active { transform: scale(0.98); }

    .whatsapp-icon {
      width: 26px; height: 26px; flex-shrink: 0;
    }

    /* Footer */
    .footer-note {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #C48BAE;
      animation: card-in 0.7s 0.4s cubic-bezier(.22,1,.36,1) both;
    }

    /* Urgency strip */
    .urgency {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(90deg, var(--pink-hot), var(--pink-dark));
      color: #fff;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 8px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      animation: card-in 0.7s 0.28s cubic-bezier(.22,1,.36,1) both;
    }
    .dot-live {
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>

  <script>
    // Spawn floating sparkles
    const emojis = ['💕','🛍️','✨','💖','🏷️','💸','🎀','⭐'];
    const container = document.getElementById('sparkles');
    function spawnSparkle() {
      const el = document.createElement('span');
      el.className = 'sparkle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const dur = 6 + Math.random() * 6;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 3) + 's';
      el.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 3) * 1000);
    }
    for (let i = 0; i < 12; i++) setTimeout(spawnSparkle, i * 500);
    setInterval(spawnSparkle, 800);
  </script>
